name: Shape Hunt CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Clean generated artifacts
        run: npm run clean

      - name: Static syntax checks
        run: npm test

      - name: Shape Hunt validation
        run: npm run validate:shape-hunt

      - name: Verify clean entry points
        run: |
          test -f apps/shape-hunt/index.html
          test -f apps/shape-hunt/src/main.js
          test -f apps/shape-hunt/src/geometry.js
          test -f apps/shape-hunt/src/state.js
          test -f apps/shape-hunt/src/styles.css
          test -f scripts/clean-shape-hunt.mjs
          test -f scripts/validate-shape-hunt.mjs
          test -f docs/dev/shape-hunt-workflow-skill.md
          ! grep -q "app-extensions.js" apps/shape-hunt/index.html
          ! grep -q "app-stability-guard.js" apps/shape-hunt/index.html
