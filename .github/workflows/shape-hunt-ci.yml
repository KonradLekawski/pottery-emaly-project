name: Shape Hunt CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check Shape Hunt JavaScript syntax
        run: npm test

      - name: Verify app entry points
        run: |
          test -f apps/shape-hunt/index.html
          test -f apps/shape-hunt/styles.css
          test -f apps/shape-hunt/extensions.css
          test -f apps/shape-hunt/cultural-engine.css
          test -f apps/shape-hunt/fit-system.css
          test -f apps/shape-hunt/evidence-scoring.css
          test -f apps/shape-hunt/research-generator.css
          test -f apps/shape-hunt/map-lab.css
          test -f apps/shape-hunt/map-interaction.css
          test -f apps/shape-hunt/app.js
          test -f apps/shape-hunt/app-extensions.js
          test -f apps/shape-hunt/app-cultural-engine.js
          test -f apps/shape-hunt/app-fit-system.js
          test -f apps/shape-hunt/app-evidence-scoring.js
          test -f apps/shape-hunt/app-research-generator.js
          test -f apps/shape-hunt/app-interaction-guard.js
          test -f apps/shape-hunt/app-map-lab.js
          test -f apps/shape-hunt/app-map-interaction.js
